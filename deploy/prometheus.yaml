global:
  scrape_interval: 15s
  # query_log_file: /prometheus/query.log
  # scrape_failure_log_file: /prometheus/scrape-failures.log
scrape_configs:
  - job_name: prom-self-monitor
    static_configs:
      - labels: 
          job: prom-self-monitor
        targets:
          - localhost:9090
remote_read:
  - url: http://proxy:9091/api/v1/read
    name: clickhouse-remote-read
    remote_timeout: 10m
    read_recent: true
    filter_external_labels: false
    basic_auth:
      username: ingest
      password: p@ssw0rd
    enable_http2: true
remote_write:
  - url: http://clickhouse:9363/remote-write
    name: clickhouse-remote-write
    remote_timeout: 10m
    basic_auth:
      username: ingest
      password: p@ssw0rd
    enable_http2: true